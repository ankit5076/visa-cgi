<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="popup.css">
    <script src="popup.js"></script>
</head>

<body>
    <section class="popup-container">
        <div id="notification">Saved</div>
        <header>
            <img src="icon.png" alt="GetSlotNow logo" class="logo">
            <h1>visa-cgi <br><span id="version"></span></h1>
        </header>
        <div class="dashboard">
        <div class="popup-row toggles-container">
            <div class="toggle-section">
                <input class="toggle-checkbox" type="checkbox" id="activate">
                <label for="activate">Activate</label>
            </div>
            <div class="toggle-section">
                <input class="toggle-checkbox" type="checkbox" id="autobook">
                <label for="autobook">Autobook</label>
            </div>
        </div>
        <h3>Login Credentials</h3>
        <div class="popup-row">
            <div class="form-group">
                <label class="bold" for="username">Username:</label>
                <input class="form-control" type="text" id="username" placeholder="Username">
            </div>
            <div class="form-group">
                <label class="bold" for="password">Password:</label>
                <input class="form-control" type="password" id="password" placeholder="Password">
            </div>
        </div>
        <div class="form-group">
            <label class="bold" for="apiKey">2Captcha API Key:</label>
            <input class="form-control" type="text" id="apiKey" placeholder="2Captcha API Key">
        </div>
        <h3>Preferred Date Range</h3>
        <div class="date-range-container">
            <div class="date-input-group">
                <label class="bold" for="startDate">Start Date:</label>
                <input class="form-control" type="date" id="startDate">
            </div>
            <div class="date-input-group">
                <label class="bold" for="endDate">End Date:</label>
                <input class="form-control" type="date" id="endDate">
            </div>
        </div>
        <h3>Check Frequency</h3>
        <div class="popup-row">
            <div class="form-group">
                <label class="bold" for="frequencyType">Frequency Type:</label>
                <select class="form-control" id="frequencyType">
                    <option selected value="seconds">Seconds</option>
                    <option value="minutes">Minutes</option>
                    <option value="hours">Hours</option>
                </select>
            </div>
            <div class="form-group">
                <label class="bold" for="frequencyValue">Value:</label>
                <input class="form-control" type="number" id="frequencyValue" min="1" max="3600" value="30">
            </div>
        </div>
        <h3>Security Questions</h3>
        <div class="question-answer-container">
            <select id="question1" class="form-control security-question question-select">
                <option value="">Select Question 1</option>
                <option value="spouse">Where did you meet your spouse?</option>
                <option value="street">What is the name of the road/street you grew up on?</option>
                <option value="mother">What is your mother's maiden name?</option>
                <option value="car">What was your first car?</option>
                <option value="job">In what city or town was your first job?</option>
                <option value="food">What is your favorite food?</option>
                <option value="school">What high school did you attend?</option>
                <option value="pet">What was the name of your first/current/favorite pet?</option>
                <option value="hero">Who was your childhood hero?</option>
                <option value="company">What was the first company that you worked for?</option>
                <option value="born">What is the name of the town/city where you were born?</option>
                <option value="college">What is the name of a college you applied to but didnt attend?</option>
                <option value="sibling">What is your sibling's middle name?</option>
            </select>
            <input type="text" id="answer1" placeholder="Answer 1" class="form-control answer-input">
        </div>
        <div class="question-answer-container">
            <select id="question2" class="form-control security-question question-select">
                <option value="">Select Question 2</option>
                <option value="spouse">Where did you meet your spouse?</option>
                <option value="street">What is the name of the road/street you grew up on?</option>
                <option value="mother">What is your mother's maiden name?</option>
                <option value="car">What was your first car?</option>
                <option value="job">In what city or town was your first job?</option>
                <option value="food">What is your favorite food?</option>
                <option value="school">What high school did you attend?</option>
                <option value="pet">What was the name of your first/current/favorite pet?</option>
                <option value="hero">Who was your childhood hero?</option>
                <option value="company">What was the first company that you worked for?</option>
                <option value="born">What is the name of the town/city where you were born?</option>
                <option value="college">What is the name of a college you applied to but didnt attend?</option>
                <option value="sibling">What is your sibling's middle name?</option>
            </select>
            <input type="text" id="answer2" placeholder="Answer 2" class="form-control answer-input">
        </div>
        <div class="question-answer-container">
            <select id="question3" class="form-control security-question question-select">
                <option value="">Select Question 3</option>
                <option value="spouse">Where did you meet your spouse?</option>
                <option value="street">What is the name of the road/street you grew up on?</option>
                <option value="mother">What is your mother's maiden name?</option>
                <option value="car">What was your first car?</option>
                <option value="job">In what city or town was your first job?</option>
                <option value="food">What is your favorite food?</option>
                <option value="school">What high school did you attend?</option>
                <option value="pet">What was the name of your first/current/favorite pet?</option>
                <option value="hero">Who was your childhood hero?</option>
                <option value="company">What was the first company that you worked for?</option>
                <option value="born">What is the name of the town/city where you were born?</option>
                <option value="college">What is the name of a college you applied to but didnt attend?</option>
                <option value="sibling">What is your sibling's middle name?</option>
            </select>
            <input type="text" id="answer3" placeholder="Answer 3" class="form-control answer-input">
        </div>
        <h3>Notification Settings</h3>
        <div class="form-group">
            <label class="bold" for="pushoverUserKey">Pushover User Key:</label>
            <input class="form-control" type="text" id="pushoverUserKey" placeholder="Pushover User Key (Optional)">
        </div>
        <small class="helper-text">
            Get booking confirmation push alerts on your phone! <a href="https://pushover.net" target="_blank">Get
                Pushover User Key</a>
        </small>
        <div class="city-section" id="ofc-city-section" style="display: none;">
            <div class="city-section-header">
                <h3>OFC Cities</h3>
                <span class="appointment-type-badge ofc-badge">OFC Appointment</span>
            </div>
            <div id="ofc-cities-grid" class="cities-grid"></div>
        </div>
        <div class="city-section" id="consular-city-section" style="display: none;">
            <div class="city-section-header">
                <h3>Consular Cities</h3>
                <span class="appointment-type-badge consular-badge">Consular Appointment</span>
            </div>
            <div id="consular-cities-grid" class="cities-grid"></div>
        </div>
        <div class="buttons-container">
            <a class="a buy" id="save">Save All</a>
            <button id="downloadLogs" class="button contact">Download Logs</button>
        </div>
        </div>
    </section>
</body>

</html>
